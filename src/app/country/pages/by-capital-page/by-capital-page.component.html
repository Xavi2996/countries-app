<div>
  <country-search
    (searchValue)="query.set($event)"
    [placehoder]="'Buscar por capital...'"
  ></country-search>
</div>

<div>
  @if (countryResource.hasValue()) {
    <country-list [countries]="countryResource.value()!"></country-list>
  }

  @if (countryResource.isLoading()) {
    <div class="spinner">Cargando países...</div>
  }

  @if (countryResource.error()) {
    <div class="alert alert-danger mt-3">
      {{ countryResource.error() }}
    </div>
  }
</div>
