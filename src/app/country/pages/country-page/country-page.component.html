@if (countryResource.error()) {
  <app-not-found></app-not-found>
}

@if (countryResource.isLoading()) {
  <p class="text-center text-gray-500 animate-pulse">Cargando..</p>
}

@if (countryResource.hasValue()) {
  <country-information
    [country]="countryResource.value()!"
  ></country-information>
}
